<header class="header">
  
  <!-- LEFT BRANDING / USER MENU TRIGGER -->
  <div class="left">
    <span class="bracket">[ </span> 
    <span class="username clickable" (click)="openMenu.emit()">Orbit</span>
    <span class="bracket"> ]</span>
  </div>

  <!-- CENTER BREADCRUMBS & ACTIONS -->
  <div class="center-breadcrumbs" *ngIf="breadcrumbs && breadcrumbs.length > 0">
  @for (crumb of breadcrumbs; track crumb.id; let last = $last) {

    <div class="breadcrumb-item" [class.current]="last" [class.previous]="!last">
      <span
        class="crumb-name"
        [class.clickable]="last && currentFolder !== 'Root'"
        (click)="onBreadcrumbClick(crumb, last)"
        [title]="getFullPathToolTip(crumb)"
      >
        @if (last && currentFolder !== 'Root') {
          [ 
        }

        <span class="crumb-text">
          {{ truncateName(crumb.name, last) }}
        </span>

        @if (last && currentFolder !== 'Root') {
          ]
        }
      </span>
    </div>

    @if (!last) {
      <span class="breadcrumb-separator">&gt;</span>
    }

    <!-- ACTIONS ATTACHED TO CURRENT FOLDER (COMMAND CLUSTER) -->
    @if (last && currentFolder !== 'Root') {
      <div class="command-cluster">
        <div class="cluster-plus">+</div>
        <div class="cluster-actions">
          <div class="cluster-action" (click)="addItem.emit()">
            <span class="bracket">[</span>
            <span class="action-text"> Add Item </span>
            <span class="bracket">]</span>
          </div>
          <div class="cluster-action" (click)="addFolder.emit()">
            <span class="bracket">[</span>
            <span class="action-text"> Add Folder </span>
            <span class="bracket">]</span>
          </div>
        </div>
      </div>
    }

  }
</div>
  
</header>
