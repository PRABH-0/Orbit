<div
  class="data-node"
  [style.transform]="'translate(' + x + 'px,' + y + 'px)'"
  [style.width.px]="width"
  [style.height.px]="height"
  [class.drag-over]="isDraggingOver"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
>

  <!-- DRAG OVER OVERLAY -->
  <div class="drag-overlay" *ngIf="isDraggingOver">
    <div class="drag-msg">
      <span class="bracket">[ </span>
      <span class="username">Drop files to upload</span>
      <span class="bracket"> ]</span>
    </div>
  </div>

  <!-- UPLOADING PROGRESS OVERLAY -->
  <div class="upload-overlay" *ngIf="isUploading">
    <div class="upload-box">
      <div class="upload-spinner"></div>
      <div class="upload-text">Uploading... {{ uploadProgress }}%</div>
      <div class="progress-track">
        <div class="progress-bar-fill" [style.width.%]="uploadProgress"></div>
      </div>
    </div>
  </div>

  <div class="data-header">
  <span class="title">{{ title }}</span>

  <div class="header-actions">
    <!-- ADD ITEM BUTTON -->
   <button
  class="add-btn"
  title="Add file"*ngIf="!isGoogleFolder"
  (click)="triggerFileInput($event)"
>
  ＋
</button>


    <!-- CLOSE -->
    <button class="close-btn" (click)="close()">✕</button>
  </div>
</div>
<!-- Hidden file input -->
<input
  type="file"
  #fileInput
  hidden
  (change)="onFileSelected($event)"
/>


  <!-- CONTENT -->
  <div class="data-grid">

<div
  class="data-item"
  *ngFor="let file of visibleItems"
  (click)="openFile(file)"
>

<div class="file-preview" [ngSwitch]="detectType(file)">

  <!-- 🖼 IMAGE -->
  <img
    *ngSwitchCase="'image'"
    [src]="isGoogleFile(file) ? file.thumbnail : getLocalImageUrl(file)"
    class="file-thumb"
    alt="thumbnail"
  />

  <!-- 🎬 VIDEO -->
  <div *ngSwitchCase="'video'" class="file-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
      <polygon points="8 21 12 17 16 21"></polygon>
    </svg>
  </div>

  <!-- 📄 PDF -->
  <div *ngSwitchCase="'pdf'" class="file-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
      <polyline points="10 9 9 9 8 9"></polyline>
    </svg>
  </div>

  <!-- 🎵 AUDIO -->
  <div *ngSwitchCase="'audio'" class="file-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"></path>
      <circle cx="6" cy="18" r="3"></circle>
      <circle cx="18" cy="16" r="3"></circle>
    </svg>
  </div>

  <!-- 📝 TEXT -->
  <div *ngSwitchCase="'text'" class="file-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
      <polyline points="14 2 14 8 20 8"></polyline>
      <line x1="16" y1="13" x2="8" y2="13"></line>
      <line x1="16" y1="17" x2="8" y2="17"></line>
      <polyline points="10 9 9 9 8 9"></polyline>
    </svg>
  </div>

  <!-- ⬇️ DEFAULT (VERY IMPORTANT) -->
  <div *ngSwitchDefault class="file-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
      <polyline points="13 2 13 9 20 9"></polyline>
    </svg>
  </div>

</div>

  <div class="file-name">
    [{{ file.fileName }}]
  </div>

</div>

</div>

<!-- Resize Handle -->
<div class="resize-handle" (mousedown)="onResizeStart($event)"></div>

  </div>
