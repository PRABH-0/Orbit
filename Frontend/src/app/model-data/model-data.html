<div
  class="data-node"
  [style.transform]="'translate(' + x + 'px,' + y + 'px)'"
>

  <div class="data-header">
  <span class="title">{{ title }}</span>

  <div class="header-actions">
    <!-- ADD ITEM BUTTON -->
   <button
  class="add-btn"
  title="Add file"*ngIf="!isGoogleFolder"
  (click)="triggerFileInput($event)"
>
  ＋
</button>


    <!-- CLOSE -->
    <button class="close-btn" (click)="close()">✕</button>
  </div>
</div>
<!-- Hidden file input -->
<input
  type="file"
  #fileInput
  hidden
  (change)="onFileSelected($event)"
/>


  <!-- CONTENT -->
  <div class="data-grid">

<div
  class="data-item"
  *ngFor="let file of visibleItems"
  (click)="openFile(file)"
>

<div class="file-preview">

  <!-- 🎵 AUDIO -->
  <div *ngIf="isAudio(file)" class="file-icon">
<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
  <path d="M9 18V5l12-2v13"></path>
  <circle cx="6" cy="18" r="3"></circle>
  <circle cx="18" cy="16" r="3"></circle>
</svg>
</div>

  <!-- 🖼 GOOGLE IMAGE -->
  <img
    *ngIf="!isAudio(file) && isGoogleFile(file) && file.thumbnail"
    [src]="file.thumbnail"
    class="file-thumb"
    alt="thumbnail"
  />
<!-- 🎬 VIDEO -->
<div *ngIf="isVideo(file)" class="file-icon">
<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
fill="none" stroke="currentColor" stroke-width="2"
viewBox="0 0 24 24">
  <polygon points="23 7 16 12 23 17 23 7"></polygon>
  <rect x="1" y="5" width="15" height="14" rx="2"></rect>
</svg>
</div>
  <!-- 🖼 LOCAL IMAGE -->
  <img
    *ngIf="!isAudio(file) && !isGoogleFile(file) && getLocalImageUrl(file)"
    [src]="getLocalImageUrl(file)"
    class="file-thumb"
    alt="thumbnail"
  />

  <!-- 📁 FALLBACK -->
  <div
    *ngIf="
      !isAudio(file) &&
      !(
        (isGoogleFile(file) && file.thumbnail) ||
        (!isGoogleFile(file) && getLocalImageUrl(file))
      )
    "
    class="file-icon"
  >
    📁
  </div>

</div>

  <div class="file-name">
    [{{ file.fileName }}]
  </div>

</div>

</div>



  </div>
