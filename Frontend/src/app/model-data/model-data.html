<div
  class="data-node"
  [style.transform]="'translate(' + x + 'px,' + y + 'px)'"
>

  <div class="data-header">
  <span class="title">{{ title }}</span>

  <div class="header-actions">
    <!-- ADD ITEM BUTTON -->
   <button
  class="add-btn"
  title="Add file"*ngIf="!isGoogleFolder"
  (click)="triggerFileInput($event)"
>
  ＋
</button>


    <!-- CLOSE -->
    <button class="close-btn" (click)="close()">✕</button>
  </div>
</div>
<!-- Hidden file input -->
<input
  type="file"
  #fileInput
  hidden
  (change)="onFileSelected($event)"
/>


  <!-- CONTENT -->
  <div class="data-grid">

<div
  class="data-item"
  *ngFor="let file of visibleItems"
  (click)="openFile(file)"
>

<div class="file-preview" [ngSwitch]="detectType(file)">

  <!-- 🖼 IMAGE -->
  <img
    *ngSwitchCase="'image'"
    [src]="isGoogleFile(file) ? file.thumbnail : getLocalImageUrl(file)"
    class="file-thumb"
    alt="thumbnail"
  />

  <!-- 🎬 VIDEO -->
  <div *ngSwitchCase="'video'" class="file-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
      fill="none" stroke="currentColor" stroke-width="2"
      viewBox="0 0 24 24">
      <polygon points="23 7 16 12 23 17 23 7"></polygon>
      <rect x="1" y="5" width="15" height="14" rx="2"></rect>
    </svg>
  </div>

  <!-- 📄 PDF -->
  <div *ngSwitchCase="'pdf'" class="file-icon">
    <svg xmlns="http://www.w3.org/2000/svg"
      width="24" height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2">
      <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/>
      <path d="M14 2v5a1 1 0 0 0 1 1h5"/>
    </svg>
  </div>

  <!-- 🎵 AUDIO -->
  <div *ngSwitchCase="'audio'" class="file-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
      fill="none" stroke="currentColor" stroke-width="2"
      viewBox="0 0 24 24">
      <path d="M9 18V5l12-2v13"></path>
      <circle cx="6" cy="18" r="3"></circle>
      <circle cx="18" cy="16" r="3"></circle>
    </svg>
  </div>

  <!-- 📝 TEXT -->
  <div *ngSwitchCase="'text'" class="file-icon">
    📝
  </div>

  <!-- ⬇️ DEFAULT (VERY IMPORTANT) -->
  <div *ngSwitchDefault class="file-icon">
    <svg xmlns="http://www.w3.org/2000/svg"
      width="24" height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2">
      <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/>
      <path d="M14 2v5a1 1 0 0 0 1 1h5"/>
      <path d="M12 18v-6"/>
      <path d="m9 15 3 3 3-3"/>
    </svg>
  </div>

</div>

  <div class="file-name">
    [{{ file.fileName }}]
  </div>

</div>

</div>



  </div>
