name: Orbit Backend CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Orbit Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet Packages
        run: dotnet restore Backend/Orbit-BE.sln

      - name: Build Orbit Backend
        run: dotnet build Backend/Orbit-BE.sln --configuration Release --no-restore